name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  web-build:
    name: build frontend
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install dependencies
        run: cd web && npm ci

      - name: build
        run: cd web && npm run build
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  build:
    name: build release binaries
    runs-on: ubuntu-latest
    needs: web-build

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o oreilly-cache-${{ matrix.suffix }} \
            ./cmd/oreilly-cache

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oreilly-cache-${{ matrix.suffix }}
          path: oreilly-cache-${{ matrix.suffix }}

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oreilly-cache-linux-amd64
            oreilly-cache-linux-arm64
